version = 1
revision = 2
requires-python = "==3.11.*"

[manifest]
members = [
    "core",
    "functions",
    "kairos-be",
]

[[package]]
name = "core"
version = "0.1.0"
source = { editable = "core" }

[[package]]
name = "functions"
version = "0.1.0"
source = { editable = "functions" }
dependencies = [
    { name = "core" },
]

[package.metadata]
requires-dist = [{ name = "core", editable = "core" }]

[[package]]
name = "kairos-be"
version = "0.1.0"
source = { virtual = "." }
